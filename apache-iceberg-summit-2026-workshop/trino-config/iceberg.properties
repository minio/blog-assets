# trino-config/iceberg.properties
# Trino Iceberg connector — talks to AIStor Tables via REST catalog + SigV4

connector.name=iceberg

# REST catalog pointing at AIStor Tables endpoint
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://minio:9000/_iceberg
iceberg.rest-catalog.warehouse=saleswarehouse

# SigV4 signing — must use service name "s3tables" for AIStor
iceberg.rest-catalog.security=SIGV4
iceberg.rest-catalog.signing-name=s3tables
iceberg.rest-catalog.view-endpoints-enabled=false

# File format defaults
iceberg.file-format=PARQUET
iceberg.compression-codec=SNAPPY

# Native S3 FileIO (not Hadoop) — required for AIStor
fs.native-s3.enabled=true
fs.hadoop.enabled=false

# S3 credentials for reading/writing Parquet data files
s3.endpoint=http://minio:9000
s3.region=local
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
